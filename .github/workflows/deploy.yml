name: Actualizar datos y desplegar

on:
  # Despliegue en cada push a la rama principal.
  push:
    branches: [main]
  # Refresco diario de los datos (11:00 UTC ≈ 07:00 en Chile).
  schedule:
    - cron: "0 11 * * *"
  # Ejecución manual desde la pestaña Actions.
  workflow_dispatch:

# Permisos que necesita el deploy a GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Un despliegue a la vez; no cancelar uno en curso.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Calcular base path de GitHub Pages
        id: bp
        run: |
          # Páginas de proyecto se sirven en /<repo>; las de usuario (<user>.github.io) en la raíz.
          if [[ "${{ github.event.repository.name }}" == *.github.io ]]; then
            echo "path=" >> "$GITHUB_OUTPUT"
          else
            echo "path=/${{ github.event.repository.name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generar datos (descarga y pre-agrega el parquet del DEIS)
        run: npm run data

      - name: Build estático
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.bp.outputs.path }}
        run: npm run build

      - name: Subir artefacto de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
